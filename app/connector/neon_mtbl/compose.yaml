services:
  app_neon_mtbl:
    build:
      context: .
      dockerfile: .hasura-connector/Dockerfile.neon_mtbl
    environment:
      CONNECTION_URI: $APP_NEON_MTBL_CONNECTION_URI
      HASURA_SERVICE_TOKEN_SECRET: $APP_NEON_MTBL_HASURA_SERVICE_TOKEN_SECRET
      OTEL_EXPORTER_OTLP_ENDPOINT: $APP_NEON_MTBL_OTEL_EXPORTER_OTLP_ENDPOINT
      OTEL_SERVICE_NAME: $APP_NEON_MTBL_OTEL_SERVICE_NAME
    extra_hosts:
      - local.hasura.dev:host-gateway
    ports:
      - 8003:8080
