kind: Connector
version: v2
definition:
  name: neon_mtbl
  subgraph: app
  source: hasura/postgres:v3.1.0
  context: .
  envMapping:
    CONNECTION_URI:
      fromEnv: APP_NEON_MTBL_CONNECTION_URI
    HASURA_CONNECTOR_PORT:
      fromEnv: APP_NEON_MTBL_HASURA_CONNECTOR_PORT
    HASURA_SERVICE_TOKEN_SECRET:
      fromEnv: APP_NEON_MTBL_HASURA_SERVICE_TOKEN_SECRET
    OTEL_EXPORTER_OTLP_ENDPOINT:
      fromEnv: APP_NEON_MTBL_OTEL_EXPORTER_OTLP_ENDPOINT
    OTEL_SERVICE_NAME:
      fromEnv: APP_NEON_MTBL_OTEL_SERVICE_NAME
